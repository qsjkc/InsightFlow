# 本地开发环境：连接虚拟机的 Redis，使用内置 Tomcat 8080 端口
server:
  port: 8080
  # 关闭 Tomcat 访问日志（本地开发无需记录）
  tomcat:
    accesslog:
      enabled: false

# Redis 配置：对接虚拟机中运行的 Redis 容器
spring:
  data:
    redis:
      host: 192.168.242.128
      port: 6379
      # 匹配虚拟机 Redis 启动时设置的密码
      password: 123456aq@
      # 连接超时时间（防止网络波动导致连接失败）
      timeout: 5000ms
      # Redis 连接池配置（性能优化）
      lettuce:
        pool:
          max-active: 8    # 最大连接数
          max-idle: 8      # 最大空闲连接
          min-idle: 2      # 最小空闲连接