<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightFlow 实时监控大屏</title>
    <!-- 引入Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --secondary-color: #64748b;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --background-color: #f8fafc;
            --card-background: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --border-radius-sm: 0.25rem;
            --border-radius-md: 0.375rem;
            --border-radius-lg: 0.5rem;
            --border-radius-xl: 0.75rem;
            --transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .header-left h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .header-left p {
            font-size: 1rem;
            color: var(--text-secondary);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 0.75rem;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border-radius: var(--border-radius-full);
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .status-badge::before {
            content: '';
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background-color: var(--success-color);
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .monitor-card {
            background: var(--card-background);
            border-radius: var(--border-radius-xl);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid var(--border-color);
        }
        
        .monitor-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .card-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .server-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        
        .data-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .data-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }
        
        .data-value-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .data-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .status-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
        }
        
        .anomaly {
            color: var(--danger-color);
        }
        
        .anomaly .status-dot {
            background-color: var(--danger-color);
        }
        
        .normal {
            color: var(--success-color);
        }
        
        .normal .status-dot {
            background-color: var(--success-color);
        }
        
        .metrics-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .metric-card {
            background: var(--card-background);
            border-radius: var(--border-radius-xl);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }
        
        .metric-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .metric-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--border-radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .metric-icon.cpu {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--primary-color);
        }
        
        .metric-icon.mem {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
        }
        
        .metric-icon.disk {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--warning-color);
        }
        
        .metric-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }
        
        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }
        
        .metric-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .trend {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .trend-up {
            color: var(--success-color);
        }
        
        .trend-down {
            color: var(--danger-color);
        }
        
        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            
            .data-grid {
                grid-template-columns: 1fr;
            }
            
            .metrics-container {
                grid-template-columns: 1fr;
            }
            
            .header-left h1 {
                font-size: 1.5rem;
            }
        }
    </style>
    <!-- 引入SockJS和STOMP客户端 -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>InsightFlow 实时监控大屏</h1>
                <p>实时监控服务器状态，及时发现异常</p>
            </div>
            <div class="header-right">
                <div class="status-badge">系统运行中</div>
            </div>
        </div>
        
        <div class="dashboard">
            <div class="monitor-card">
                <div class="card-header">
                    <h2>服务器监控</h2>
                    <div class="server-info">
                        <span>服务器：server-01</span>
                        <span>采集时间：<span id="collectTime">--</span></span>
                    </div>
                </div>
                <div class="data-grid">
                    <div class="data-item">
                        <span class="data-label">CPU使用率</span>
                        <div class="data-value-container">
                            <span class="data-value" id="cpuUsage">--</span>%
                            <span class="status-indicator normal" id="cpuAnomaly">
                                <span class="status-dot"></span>
                                <span>正常</span>
                            </span>
                        </div>
                    </div>
                    <div class="data-item">
                        <span class="data-label">内存使用率</span>
                        <div class="data-value-container">
                            <span class="data-value" id="memUsage">--</span>%
                            <span class="status-indicator normal" id="memAnomaly">
                                <span class="status-dot"></span>
                                <span>正常</span>
                            </span>
                        </div>
                    </div>
                    <div class="data-item">
                        <span class="data-label">磁盘使用率</span>
                        <div class="data-value-container">
                            <span class="data-value" id="diskUsage">--</span>%
                            <span class="status-indicator normal" id="diskAnomaly">
                                <span class="status-dot"></span>
                                <span>正常</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="metrics-container">
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-label">CPU使用率</div>
                    <div class="metric-icon cpu">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
                    </div>
                </div>
                <div class="metric-value" id="cpuMetric">--</div>
                <div class="metric-footer">
                    <span>实时监控</span>
                    <span class="trend trend-up">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                        <span>0.5%</span>
                    </span>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-label">内存使用率</div>
                    <div class="metric-icon mem">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="12" y1="2" x2="12" y2="6"></line></svg>
                    </div>
                </div>
                <div class="metric-value" id="memMetric">--</div>
                <div class="metric-footer">
                    <span>实时监控</span>
                    <span class="trend trend-up">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                        <span>0.2%</span>
                    </span>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-label">磁盘使用率</div>
                    <div class="metric-icon disk">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M5 10h14"></path></svg>
                    </div>
                </div>
                <div class="metric-value" id="diskMetric">--</div>
                <div class="metric-footer">
                    <span>实时监控</span>
                    <span class="trend trend-down">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>
                        <span>0.1%</span>
                    </span>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 InsightFlow 实时监控系统</p>
        </div>
    </div>

<script>
    /**
     * @type {SockJS}
     */
    const socket = new SockJS('/ws/monitor');
    /**
     * @type {Stomp}
     */
    const stompClient = Stomp.over(socket);

    // 存储历史数据用于计算趋势
    const historyData = {
        cpu: [],
        mem: [],
        disk: []
    };

    // 最大历史数据点
    const MAX_HISTORY_POINTS = 10;

    stompClient.connect({}, function (frame) {
        console.log('Connected: ' + frame);
        stompClient.subscribe('/topic/monitor/data', function (message) {
            const data = JSON.parse(message.body);
            console.log('收到监控数据：', data);

            // 更新采集时间
            document.getElementById('collectTime').textContent = data.rawData.collectTime;
            
            // 更新监控数据
            updateMetric('cpu', data.rawData.cpuUsage, data.cpuResult.isAnomaly);
            updateMetric('mem', data.rawData.memUsage, data.memResult.isAnomaly);
            updateMetric('disk', data.rawData.diskUsage, data.diskResult.isAnomaly);
        });
    });

    /**
     * 更新指标数据
     * @param {string} type - 指标类型 (cpu, mem, disk)
     * @param {number} value - 指标值
     * @param {boolean} isAnomaly - 是否异常
     */
    function updateMetric(type, value, isAnomaly) {
        // 更新主要数据显示
        document.getElementById(`${type}Usage`).textContent = value;
        
        // 更新指标卡片
        document.getElementById(`${type}Metric`).textContent = value + '%';
        
        // 更新异常状态
        updateAnomalyStatus(`${type}Anomaly`, isAnomaly);
        
        // 更新历史数据
        updateHistoryData(type, value);
        
        // 更新趋势显示
        updateTrend(type);
    }

    /**
     * 更新异常状态显示
     * @param {string} elementId
     * @param {boolean} isAnomaly
     */
    function updateAnomalyStatus(elementId, isAnomaly) {
        const element = document.getElementById(elementId);
        if (isAnomaly) {
            element.innerHTML = '<span class="status-dot"></span><span>异常</span>';
            element.className = 'status-indicator anomaly';
        } else {
            element.innerHTML = '<span class="status-dot"></span><span>正常</span>';
            element.className = 'status-indicator normal';
        }
    }

    /**
     * 更新历史数据
     * @param {string} type - 指标类型
     * @param {number} value - 指标值
     */
    function updateHistoryData(type, value) {
        historyData[type].push(value);
        if (historyData[type].length > MAX_HISTORY_POINTS) {
            historyData[type].shift();
        }
    }

    /**
     * 更新趋势显示
     * @param {string} type - 指标类型
     */
    function updateTrend(type) {
        if (historyData[type].length < 2) return;
        
        const currentValue = historyData[type][historyData[type].length - 1];
        const previousValue = historyData[type][historyData[type].length - 2];
        const trendElement = document.querySelector(`.metric-card:nth-child(${type === 'cpu' ? 1 : type === 'mem' ? 2 : 3}) .trend`);
        
        if (currentValue > previousValue) {
            trendElement.className = 'trend trend-up';
            const change = (currentValue - previousValue).toFixed(1);
            trendElement.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                <span>${change}%</span>
            `;
        } else if (currentValue < previousValue) {
            trendElement.className = 'trend trend-down';
            const change = (previousValue - currentValue).toFixed(1);
            trendElement.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>
                <span>${change}%</span>
            `;
        }
    }

    window.onbeforeunload = function() {
        stompClient.disconnect();
    };
</script>
</body>
</html>
